<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S3D Image Studio | استوديو توليد الصور</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; color: #fff; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(135deg, #38bdf8, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-radius: 50%; border-top-color: #38bdf8; animation: spin 1s linear infinite; width: 24px; height: 24px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <header class="text-center mb-10">
        <h1 class="text-4xl md:text-6xl font-black gradient-text mb-4">S3D Image Studio</h1>
        <p class="text-slate-400 text-lg">اكتب فكرتك ببساطة، وسيحولها الذكاء الاصطناعي إلى لوحة فنية</p>
    </header>

    <main class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 gap-8">
        
        <div class="glass p-8 rounded-[2rem] flex flex-col gap-6 h-fit">
            <div class="space-y-3">
                <label class="text-sm font-bold text-slate-300">ماذا تتخيل؟ (اكتب بالعربية ببساطة)</label>
                <textarea id="prompt-input" rows="4" class="w-full bg-slate-900/50 border border-slate-700 rounded-2xl p-4 text-lg focus:ring-2 focus:ring-sky-500 outline-none transition-all resize-none shadow-inner" placeholder="مثال: مدينة الدوحة ثلاثية الأبعاد بطابع معدني مجسم..."></textarea>
            </div>

            <button onclick="generateImage()" id="gen-btn" class="w-full bg-sky-500 text-white py-4 rounded-2xl font-black text-xl hover:bg-sky-400 transition-all flex items-center justify-center gap-3 shadow-[0_0_20px_rgba(56,189,248,0.3)]">
                <span>توليد الصورة 🎨</span>
                <div id="loader" class="loader hidden"></div>
            </button>

            <div id="enhanced-prompt-box" class="hidden mt-4 p-4 bg-slate-800/50 rounded-xl border border-slate-700">
                <p class="text-xs text-slate-400 font-bold mb-2">✨ البرومبت الاحترافي الذي ابتكره الذكاء الاصطناعي:</p>
                <p id="enhanced-prompt-text" class="text-sm text-sky-200 dir-ltr text-left italic font-mono"></p>
            </div>
        </div>

        <div class="glass p-8 rounded-[2rem] flex flex-col items-center justify-center min-h-[400px] relative overflow-hidden">
            <div id="empty-state" class="text-center space-y-4">
                <div class="text-6xl opacity-30">🖼️</div>
                <p class="text-slate-500 font-medium">ستظهر تحفتك الفنية هنا</p>
            </div>

            <div id="result-display" class="hidden w-full h-full flex flex-col items-center justify-center gap-4">
                <img id="generated-image" class="max-w-full max-h-[500px] rounded-xl shadow-2xl object-contain border border-white/10" src="" alt="Generated Image">
                <a id="download-btn" href="#" target="_blank" class="px-6 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-full text-sm font-bold transition flex items-center gap-2">
                    ⬇️ فتح بحجم كامل
                </a>
            </div>
        </div>
    </main>

    <script>
        async function generateImage() {
            const prompt = document.getElementById('prompt-input').value;
            const btn = document.getElementById('gen-btn');
            const loader = document.getElementById('loader');
            const emptyState = document.getElementById('empty-state');
            const resultDisplay = document.getElementById('result-display');
            const genImage = document.getElementById('generated-image');
            const enhancedPromptBox = document.getElementById('enhanced-prompt-box');
            const enhancedPromptText = document.getElementById('enhanced-prompt-text');
            const downloadBtn = document.getElementById('download-btn');
            
            if (!prompt.trim()) return alert('الرجاء كتابة الفكرة أولاً!');

            // تغيير حالة الواجهة
            btn.disabled = true;
            loader.classList.remove('hidden');
            emptyState.classList.remove('hidden');
            resultDisplay.classList.add('hidden');
            enhancedPromptBox.classList.add('hidden');
            emptyState.innerHTML = '<div class="loader mx-auto mb-4 scale-150"></div><p class="text-sky-400 font-bold animate-pulse">جاري هندسة البرومبت ورسم الصورة...</p>';
            
            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    // عرض البرومبت المطور
                    enhancedPromptText.innerText = data.enhancedPrompt;
                    enhancedPromptBox.classList.remove('hidden');
                    
                    // عرض الصورة
                    genImage.src = data.imageUrl;
                    downloadBtn.href = data.imageUrl;
                    
                    // إخفاء التحميل وإظهار النتيجة بعد تحميل الصورة فعلياً
                    genImage.onload = () => {
                        emptyState.classList.add('hidden');
                        resultDisplay.classList.remove('hidden');
                        resultDisplay.classList.add('flex');
                    };
                } else {
                    alert('خطأ من الخادم: ' + data.error);
                    emptyState.innerHTML = '<div class="text-4xl mb-2">❌</div><p class="text-red-400">حدث خطأ</p>';
                }
            } catch (e) {
                alert('حدث خطأ في الاتصال');
                emptyState.innerHTML = '<div class="text-4xl mb-2">🔌</div><p class="text-red-400">مشكلة في الاتصال</p>';
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
