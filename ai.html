<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SSX Builder AI</title><style>*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial;background:#07111f;color:#fff}.wrap{display:grid;grid-template-columns:340px 1fr;gap:16px;min-height:100vh;padding:16px}.panel{background:#0f172a;border:1px solid #26364f;border-radius:18px;padding:16px}h1{font-size:22px;margin:0 0 12px}label{font-size:13px;color:#cbd5e1}textarea,input,button{width:100%;border-radius:12px;border:1px solid #334155;padding:12px;margin-top:8px;background:#020617;color:#fff}button{background:#0284c7;font-weight:700;cursor:pointer}.phone{margin:auto;width:390px;max-width:94vw;height:820px;background:#f8fafc;color:#111827;border:12px solid #111827;border-radius:42px;overflow:auto;padding:45px 18px 18px}.hero{background:linear-gradient(135deg,#dbeafe,#bae6fd);padding:22px;border-radius:24px}.card{background:#fff;margin:12px 0;padding:16px;border-radius:18px;box-shadow:0 8px 24px #0002}.btn{background:#0284c7;color:#fff;text-align:center;padding:14px;border-radius:16px;font-weight:700}.nav{display:flex;justify-content:space-around;background:#111827;color:#fff;border-radius:18px;padding:12px;margin-top:12px}.search{background:#e2e8f0;color:#111827}.small{color:#94a3b8;font-size:12px}@media(max-width:850px){.wrap{grid-template-columns:1fr}.phone{height:720px}}</style></head><body><main class="wrap"><section class="panel"><h1>SSX Builder AI</h1><label>اكتب وصف الشاشة</label><textarea id="prompt" placeholder="مثال: شاشة متجر عطور فخم في قطر مع عروض وزر شراء"></textarea><button onclick="build()">ابنِ الشاشة</button><button onclick="downloadHtml()">تصدير HTML</button><p class="small">مولد محلي بدون API. مناسب كنموذج أولي سريع.</p></section><section><div id="screen" class="phone"></div></section></main><script>function esc(s){return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function model(t){t=(t||'').toLowerCase();let name='تطبيق خدمات',cta='ابدأ الآن',cards=['خدمة سريعة','أسعار واضحة','دعم مباشر'];if(/متجر|عطور|ملابس|منتج|بيع/.test(t)){name='متجر ذكي';cta='تسوّق الآن';cards=['منتج مميز','عروض اليوم','الأكثر طلبًا']}if(/مطعم|اكل|طعام|قهوة|كافيه/.test(t)){name='مطعم عصري';cta='اطلب الآن';cards=['وجبات مميزة','عروض الغداء','توصيل سريع']}if(/حجز|موعد|عيادة|صالون/.test(t)){name='نظام حجوزات';cta='احجز موعدك';cards=['مواعيد متاحة','خدمات مختارة','تقييمات العملاء']}if(/عقار|عقارات|فيلا|شقة/.test(t)){name='منصة عقارات';cta='استعرض العقارات';cards=['فلل فاخرة','شقق للإيجار','عروض جديدة']}return{name,cta,cards}}function build(){const p=document.getElementById('prompt').value||'واجهة جوال حديثة';const m=model(p);document.getElementById('screen').innerHTML='<div class="hero"><h2>'+esc(m.name)+'</h2><p>'+esc(p)+'</p></div><input class="search" placeholder="ابحث هنا">'+m.cards.map(x=>'<div class="card"><b>'+esc(x)+'</b><p>قسم جاهز قابل للتعديل ومناسب للجوال.</p></div>').join('')+'<div class="btn">'+esc(m.cta)+'</div><div class="nav"><span>الرئيسية</span><span>بحث</span><span>حسابي</span></div>'}function downloadHtml(){const content='<!doctype html><html lang="ar" dir="rtl"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><body>'+document.getElementById('screen').innerHTML+'</body></html>';const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type:'text/html'}));a.download='ssx-screen.html';a.click()}build()</script></body></html>
